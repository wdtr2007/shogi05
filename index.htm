<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Shogi Copper - Game</title>
    <link rel="stylesheet" type="text/css" href="index.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="./pgm01.js">  </script>
</head>
<body>
  <table>
      <tr>
      <td id="td1" style="width:200px; vertical-align:top;">
        <div id="col1">
          <div id="clockContainer" style="margin:0 0 6px 0; display:flex; gap:6px; align-items:flex-start; flex-wrap:wrap; justify-content:flex-start;">
            <div style="padding:10px; border:1px solid #555; width:180px; background:#f7f7f7;">
              <strong>White</strong>
              <div id="whiteTime" style="font-size:24px; margin-top:8px;">30:00</div>
              <div id="whiteByo" style="font-size:14px; color:#333; margin-top:4px;">Byo: 30</div>
            </div>
            <div style="padding:10px; border:1px solid #555; width:180px; background:#f7f7f7;">
              <strong>Black</strong>
              <div id="blackTime" style="font-size:24px; margin-top:8px;">30:00</div>
              <div id="blackByo" style="font-size:14px; color:#333; margin-top:4px;">Byo: 30</div>
            </div>
            <div style="padding:10px; border:1px solid #555; width:180px; background:#f7f7f7;">
              <strong>Clock status</strong>
              <div id="clockStatus" style="font-size:14px; margin-top:8px;">Ready</div>
              <button id="resetClockButton" type="button" style="margin-top:10px;">Reset Clock</button>
            </div>
          </div>

          <div id="multiplayerPanel" style="margin-bottom:16px; padding:12px; border:2px solid #555; background:#f7f7f7; width:100%; max-width:220px; box-sizing:border-box;">
            <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:8px;">
              <input id="playerNameInput" type="text" placeholder="Your name" value="Player" style="min-width:140px;">
              <input id="roomIdInput" type="text" placeholder="Room ID" style="min-width:140px;">
              <button id="createRoomButton" type="button">Create Room</button>
              <label style="font-size:14px;"><input id="publicRoomCheckbox" type="checkbox" checked> Public lobby</label>
              <label style="font-size:14px;"><input id="KingPass"           type="checkbox" checked> King Pass OK</label>
            </div>
            <div id="roomStatus" style="font-size:14px; color:#333;">Offline</div>
            <div id="lobbyList" style="margin-top:10px; font-size:14px;"></div>
          </div>

        </div>
      </td>
      
      <td id="td2" style="width:220px; vertical-align:top;">
      <div id="col2" style="flex-direction:column; align-items:flex-start; gap:16px;">

        <div id="MovesMade" style="margin-bottom:16px; padding:12px; border:2px solid #555; background:#f7f7f7; box-sizing:border-box;">
          <select id="movesListBox" multiple size="10" style="box-sizing:border-box; "></select>
          
          <div><button id="takeBackButton" type="button">Take Back</button></div>
          <div id="takebackRequestPanel" style="display:none; margin-top:8px; padding:8px; border:1px solid #ccc; background:#fffacd;">
            <div style="margin-bottom:8px; font-weight:bold;">Opponent requests takeback</div>
            <button id="takeBackOK" type="button" style="margin-right:8px; background-color:#90EE90;">TakeBackOK</button>
            <button id="takeBackNo" type="button" style="background-color:#FFB6C6;">TakeBackNo</button>
          </div>
          <div><button id="stopButton" type="button">Stop Clock</button></div>
          <div><button id="startButton" type="button">Start Clock</button></div>
          <div><button id="DisplayFEN" type="button">Display FEN</button></div>
          <div><button id="LoadFEN" type="button">Load FEN</button></div>
          <div><button id="HighlightButton" type="button">Change Highlight</button>  </div> 
          <div><button id="loadFile" type="button">Load File</button></div>
          <div><button id="flipBoardButton" type="button">Flip Board</button></div>
        </div>

      </div>
      </td>

      <td id="td3" style="width:50%; vertical-align:top;">
        <div id="col3" style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <div id="gameContainer"></div>
          <div id="boardContainer"></div>
        </div>
      </td>

      </tr>
  </table>
  
  <p></p>
  <table id="table2">
    <tr>
      <td>
        <div id="fileNameTextArea">
          <textarea id="fileNameText" rows="1" cols="120" placeholder="5.0 Enter file name"></textarea>
        </div>
      </td>
    </tr>
  </table>
 
   
</body>
</html>
